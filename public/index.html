<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0a1a 0%,#1a1a3e 50%,#0d0d2b 100%);color:#e0e0e0;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh}
.page{max-width:600px;margin:0 auto;padding:30px 16px 60px}
.logo{text-align:center;margin-bottom:24px;position:relative}
.logo::before{content:'◇';position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:48px;color:#d4a843;opacity:.15}

.card{background:rgba(22,33,62,.85);border-radius:12px;border:1px solid rgba(42,58,94,.6);padding:24px;margin-bottom:14px;backdrop-filter:blur(10px)}
.card h2{font-size:14px;color:#d4a843;margin-bottom:12px;display:flex;align-items:center;gap:8px;letter-spacing:.5px}
.steps{background:rgba(15,22,41,.6);border-radius:8px;padding:12px 14px;font-size:12.5px;color:#bbb;line-height:1.8;margin-bottom:14px;border:1px solid rgba(42,58,94,.3)}

.steps code{display:block;background:#0a0a1a;padding:8px 10px;border-radius:6px;font-size:11.5px;color:#6bb5ff;word-break:break-all;margin:6px 0;border:1px solid rgba(42,58,94,.3)}

label{display:block;font-size:12px;color:#888;margin-bottom:5px;letter-spacing:.5px}
input{width:100%;padding:10px 14px;background:rgba(15,22,41,.8);border:1px solid rgba(42,58,94,.5);border-radius:8px;color:#e0e0e0;font-size:13px;outline:none;transition:all .2s}
input:focus{border-color:rgba(212,168,67,.5);box-shadow:0 0 12px rgba(212,168,67,.08)}
.btn{width:100%;padding:11px;border:none;border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s;margin-top:4px;letter-spacing:1px}
.btn-primary{background:linear-gradient(135deg,#d4a843,#c49430);color:#0a0a1a;font-weight:700}
.btn-primary:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 4px 16px rgba(212,168,67,.25)}

.status{padding:10px 14px;border-radius:6px;font-size:12.5px;margin-top:10px;display:none;animation:fadeIn .3s}

@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(10,10,26,.3);border-top-color:#0a0a1a;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.result{display:none;margin-top:12px;animation:fadeIn .4s}
.result.show{display:block}
.pre-wrap{background:rgba(15,22,41,.6);padding:10px;border-radius:6px;font-size:11px;color:#6bb5ff;overflow-x:auto;max-height:140px;border:1px solid rgba(42,58,94,.3)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stat-item{background:rgba(15,22,41,.6);border-radius:8px;padding:12px 8px;text-align:center;border:1px solid rgba(42,58,94,.3)}
.stat-num{font-size:22px;font-weight:700;color:#d4a843}
.stat-label{font-size:10.5px;color:#777;margin-top:2px;letter-spacing:.5px}
.table-wrap{max-height:320px;overflow-y:auto;border-radius:8px;border:1px solid rgba(42,58,94,.3)}
.table-wrap::-webkit-scrollbar{width:4px}
.table-wrap::-webkit-scrollbar-track{background:transparent}
.table-wrap::-webkit-scrollbar-thumb{background:rgba(212,168,67,.3);border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;background:rgba(15,22,41,.8);color:#d4a843;font-weight:600;position:sticky;top:0;z-index:1;border-bottom:1px solid rgba(42,58,94,.5);letter-spacing:.5px}
td{padding:7px 10px;border-bottom:1px solid rgba(42,58,94,.15)}
tr:hover td{background:rgba(212,168,67,.04)}
.rarity6{color:#ff6b35;font-weight:600}.rarity5{color:#d4a843}.rarity4{color:#aa88ff}.rarity3{color:#88ccff}.rarity2{color:#88dd88}.rarity1{color:#aaa}
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;margin-left:4px;vertical-align:middle}
.tag-6{background:rgba(255,107,53,.15);color:#ff6b35}
.tag-5{background:rgba(212,168,67,.15);color:#d4a843}
.tag-4{background:rgba(170,136,255,.15);color:#aa88ff}
.tag-3{background:rgba(136,204,255,.15);color:#88ccff}
.tag-2{background:rgba(136,221,136,.15);color:#88dd88}
.tag-1{background:rgba(170,170,170,.15);color:#aaa}
.elite-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;background:rgba(42,58,94,.4);color:#888}
.shift-tabs{display:flex;gap:6px;margin-bottom:10px}
.shift-tab{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;background:rgba(15,22,41,.6);border:1px solid rgba(42,58,94,.3);color:#888;transition:all .2s}
.shift-tab.active{background:rgba(212,168,67,.15);border-color:rgba(212,168,67,.4);color:#d4a843}
.facility-card{background:rgba(15,22,41,.6);border-radius:8px;padding:10px;margin-bottom:8px;border:1px solid rgba(42,58,94,.3)}

.eff-total{text-align:center;font-size:13px;color:#d4a843;padding:8px;margin-top:8px;background:rgba(212,168,67,.06);border-radius:6px}
.footer{text-align:center;font-size:11px;color:#555;margin-top:32px;letter-spacing:.5px}
</style>

<body>
<div class="page">
  <div class="logo">
    <h1>◇ 罗德岛智能排班系统</h1>

  <div class="card">

      <strong>一步获取凭证</strong><br>

<script>
function sign(path, params, token) {
  const ts = String(Math.floor((Date.now() - 300) / 1000))
  const headers = {
    platform: '3',
    timestamp: ts,
    dId: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:109.0) Gecko/20100101 Firefox/118.0',
    vName: '1.2.0'
  }
  const text = path + (params||'') + ts + JSON.stringify(headers)
  const hmacHex = CryptoJS.HmacSHA256(text, token).toString()
  const sign = CryptoJS.MD5(hmacHex).toString()
  return { timestamp: ts, sign, headers }
}

async function api(url, headers) {
  const r = await fetch(url, { headers })
  const t = await r.text()
  try { return JSON.parse(t) } catch { return { code: -1, message: t.slice(0,200) } }
}

function showStatus(type, msg) {
  const el = document.getElementById('status')
  el.className = 'status ' + type
  el.innerHTML = msg
}

const rarityClass = ['','','','rarity4','rarity5','rarity6']
const rarityLabel = ['','','','★4','★5','★6']

async function login() {
  const btn = document.getElementById('loginBtn')
  const cred = document.getElementById('credInput').value.trim()
  if (!cred) { showStatus('error', '请输入credential'); return }
  
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span>获取中...'
  
  try {
    showStatus('info', '正在连接森空岛...')
    const r1 = await api('/api/sw/v1/auth/refresh', { cred })
    if (r1.code !== 0) throw new Error('刷新token失败: ' + (r1.message || ''))
    const token = r1.data.token
    
    showStatus('info', '已获取签名token...')
    
    const s1 = sign('/api/v1/game/player/binding', '', token)
    const r2 = await api('/api/sk/v1/game/player/binding', { cred, ...s1.headers, sign: s1.sign })
    if (r2.code !== 0) throw new Error('获取绑定失败: ' + (r2.message || ''))
    
    let uid = '0', nick = ''
    for (const a of (r2.data?.list||[])) {
      if (a.appCode === 'arknights') {
        uid = a.bindingList[0].uid
        nick = a.bindingList[0].nickName || ''
        break
      }
    }
    if (uid === '0') throw new Error('未找到明日方舟角色绑定')
    showStatus('info', 'UID: ' + uid)
    
    const s2 = sign('/api/v1/game/player/info', 'uid='+uid, token)
    const r3 = await api('/api/sk/v1/game/player/info?uid='+uid, { cred, ...s2.headers, sign: s2.sign })
    if (r3.code !== 0) throw new Error('获取数据失败: ' + (r3.message || ''))
    
    const d = r3.data
    const chars = d.chars || []
    const building = d.building || {}
    const charInfoMap = d.charInfoMap || {}
    
    showStatus('success', '✅ 获取成功！' + chars.length + '名干员')
    
    // 统计
    const stats = document.getElementById('stats')
    stats.innerHTML = '' +
      '<div class="stat-item"><div class="stat-num">' + chars.length + '</div><div class="stat-label">干员</div></div>' +
      '<div class="stat-item"><div class="stat-num">' + (d.status?.level||'?') + '</div><div class="stat-label">博士等级</div></div>' +
      '<div class="stat-item"><div class="stat-num">' + ((building.manufactures||[]).length) + '</div><div class="stat-label">制造站</div></div>'
    
    // 干员表格
    let html = '<table><thead><tr><th>名字</th><th>星级</th><th>等级</th><th>精英</th></tr></thead><tbody>'
    for (const c of chars) {
      const id = c.id || c.charId
      const info = charInfoMap[id]
      const name = info?.name || id
      const rarity = c.rarity || info?.rarity || 1
      const cls = 'rarity' + rarity
      const tagCls = 'tag tag-' + rarity
      html += '<tr><td class="' + cls + '">' + name + '</td>' +
        '<td><span class="' + tagCls + '">★' + rarity + '</span></td>' +
        '<td>' + (c.level||'?') + '</td>' +
        '<td><span class="elite-badge">' + ('精英' + (c.evolvePhase||0)) + '</span></td></tr>'
    }
    html += '</tbody></table>'
    document.getElementById('tableWrap').innerHTML = html
    document.getElementById('resultCard').classList.add('show')
    document.getElementById('scheduleCard').classList.add('show')
    
    // 存数据
    localStorage.setItem('ak_user_data', JSON.stringify({
      nickname: d.status?.nickName || nick || '博士',
      level: d.status?.level || 0,
      uid,
      chars: chars.map(c => {
        const id = c.id||c.charId
        const info = charInfoMap[id]
        return {
          charId: id,
          name: info?.name || id,
          rarity: c.rarity || info?.rarity || 1,
          level: c.level||1,
          elite: c.evolvePhase||0,
          potential: Math.ceil((c.potentialRank||0)+1),
          own: true,
        }
      }),
      building: { manufactures: building.manufactures||[], tradings: building.tradings||[], dormitories: building.dormitories||[], power: building.power||null, meeting: building.meeting||null, training: building.training||null, tiredChars: building.tiredChars||[], labor: building.labor||{} },
      charInfoMap: Object.fromEntries(Object.entries(charInfoMap).map(([k,v]) => [k, {name: v.name, rarity: v.rarity}])),
    }))
    
  } catch (e) {
    showStatus('error', '❌ ' + e.message)
    console.error(e)
  } finally {
    btn.disabled = false
    btn.innerHTML = '获取干员数据'
  }
}

// ===== 排班算法 v2 （重写：两班+控制中心+制造分类+联动+心情）=====
const FACILITY_CFG = {
  manufacture: { label:'制造站', slots:3, moodCost:0.75 },
  trading:     { label:'贸易站', slots:3, moodCost:0.75 },
  power:       { label:'发电站', slots:2, moodCost:0.75 },
  meeting:     { label:'会客室', slots:2, moodCost:0.5 },
  training:    { label:'训练室', slots:1, moodCost:0.3 },
  control:     { label:'控制中心', slots:5, moodCost:0.5 },
}
function classifyMF(d){if(!d)return'通用';if(d.includes('源石'))return'源石碎片';if(d.includes('贵金属')||d.includes('赤金'))return'赤金';if(d.includes('作战记录'))return'作战记录';if(d.includes('技巧概要'))return'技巧概要';return'通用'}
let baseSkillsCache=null
async function loadBaseSkills(){if(baseSkillsCache)return baseSkillsCache;const r=await fetch('/data/baseSkills.json');baseSkillsCache=await r.json();return baseSkillsCache}
function analyzeSkills(chars,skills){return(chars||[]).map(c=>{const sd=skills[c.charId];if(!sd)return{...c,baseSkills:{}};const fac={},moods=[],combos=[];let mfCat=null
  for(const[f,info]of Object.entries(sd)){if(['name','rarity'].includes(f))continue;const d=info.desc||'';fac[f]={type:info.type||'',value:info.value||0,desc:d}
  if(d.includes('心情每小时消耗')){const m=d.match(/心情每小时消耗([+-])([\d.]+)/);if(m)moods.push({facility:f,cost:parseFloat(m[1]+m[2])})}
  if(f!=='dormitory'&&(d.includes('若')||d.includes('当')||d.includes('如果')||d.includes('同个')||d.includes('额外')))combos.push({facility:f,desc:d.slice(0,80)})
  if(f==='manufacture')mfCat=classifyMF(d)}
  return{...c,rarity:sd.rarity||c.rarity||1,baseSkills:fac,mfCat,moods,combos}})}
function pickMF(type,pool,count,cat){const a=pool.filter(o=>o.baseSkills&&o.baseSkills[type]&&o.mfCat===cat).sort((a,b)=>b.baseSkills[type].value-a.baseSkills[type].value)
  const b=pool.filter(o=>o.baseSkills&&o.baseSkills[type]&&o.mfCat!==cat).sort((a,b)=>b.baseSkills[type].value-a.baseSkills[type].value)
  const u=new Set(),r=[];let e=0
  for(const l of[a,b]){for(const o of l){if(r.length>=count)break;if(u.has(o.charId))continue;u.add(o.charId);r.push({name:o.name,rarity:o.rarity,skill:o.baseSkills[type],moodCost:o.moods?.find(m=>m.facility===type)});e+=o.baseSkills[type]?.value||0}}
  for(const o of pool){if(r.length>=count)break;if(u.has(o.charId))continue;u.add(o.charId);r.push({name:o.name,rarity:o.rarity,skill:{type:'general',value:0,desc:'通用'}})}
  while(r.length<count)r.push({name:'空位',rarity:1,skill:{type:'empty',value:0,desc:'待分配'}});return{assigned:r,efficiency:e}}
function pickFac(type,pool,count){if(type==='control'){const sorted=[...pool].sort((a,b)=>{const aC=a.combos?.length||0,bC=b.combos?.length||0;if(aC!==bC)return bC-aC
  const aS=Object.keys(a.baseSkills||{}).length,bS=Object.keys(b.baseSkills||{}).length;if(aS!==bS)return aS-bS;return b.rarity-a.rarity});return pickGeneric(sorted,count)}
  const a=pool.filter(o=>o.baseSkills&&o.baseSkills[type]).sort((a,b)=>b.baseSkills[type].value-a.baseSkills[type].value)
  const u=new Set(),r=[];let e=0
  for(const o of a){if(r.length>=count)break;if(u.has(o.charId))continue;u.add(o.charId);r.push({name:o.name,rarity:o.rarity,skill:o.baseSkills[type],moodCost:o.moods?.find(m=>m.facility===type)});e+=o.baseSkills[type]?.value||0}
  for(const o of pool){if(r.length>=count)break;if(u.has(o.charId))continue;u.add(o.charId);r.push({name:o.name,rarity:o.rarity,skill:{type:'general',value:0,desc:'通用'},moodCost:null})}
  while(r.length<count)r.push({name:'空位',rarity:1,skill:{type:'empty',value:0,desc:'待分配'},moodCost:null});return{assigned:r,efficiency:e}}
function pickGeneric(pool,count){const u=new Set(),r=[];let e=0
  for(const o of pool){if(r.length>=count)break;if(u.has(o.charId))continue;u.add(o.charId);r.push({name:o.name,rarity:o.rarity,skill:{type:'general',value:0,desc:'通用'},moodCost:null});e+=0}
  for(const o of pool){if(r.length>=count)break;if(u.has(o.charId))continue;u.add(o.charId);r.push({name:o.name,rarity:o.rarity,skill:{type:'general',value:0,desc:'通用'},moodCost:null})}
  while(r.length<count)r.push({name:'空位',rarity:1,skill:{type:'empty',value:0,desc:'待分配'},moodCost:null});return{assigned:r,efficiency:e}}
function generateSchedule(ud,skills){const chars=analyzeSkills(ud.chars||[],skills),bld=ud.building||{}
  const mfC=Math.max((bld.manufactures||[]).length,2),trC=Math.max((bld.tradings||[]).length,1),cats=['赤金','作战记录','源石碎片','通用','赤金']
  const scs=[];for(let s=0;s<2;s++){const pool=[...chars],off=Math.floor(pool.length/2)*s,rot=[...pool.slice(off),...pool.slice(0,off)]
    const fs={};let te=0
    fs.control=pickFac('control',chars,5)
    fs.manufacture=[];for(let m=0;m<mfC;m++){const r=pickMF('manufacture',rot,3,cats[m%cats.length]);r.label=`制造站${m+1}(${cats[m%cats.length]})`;fs.manufacture.push(r);te+=r.efficiency}
    fs.trading=[];for(let t=0;t<trC;t++){const r=pickFac('trading',rot,3);r.label=`贸易站${t+1}`;fs.trading.push(r);te+=r.efficiency}
    fs.power=[];for(let p=0;p<2;p++){const r=pickFac('power',rot,2);r.label=`发电站${p+1}`;fs.power.push(r);te+=r.efficiency}
    fs.meeting=pickFac('meeting',rot,2);fs.training=pickFac('training',rot,1)
    let tm=0;for(const[f,d]of Object.entries(fs)){const items=d.assigned||(Array.isArray(d)?d.flatMap(x=>x.assigned):[d])||[];const list=Array.isArray(d)?d:[d];for(const i of list){const ops=i.assigned||[i];for(const o of ops)if(o.moodCost)tm+=o.moodCost.cost}}
    scs.push({shift:s+1,label:['A班','B班'][s],facilities:fs,efficiency:te,moodCost:tm})}
  return{schedules:scs,totalEfficiency:scs.reduce((s,x)=>s+x.efficiency,0)}}
async function runSchedule(){const btn=document.getElementById('scheduleBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>计算中...'
  try{const raw=localStorage.getItem('ak_user_data');if(!raw){alert('请先获取干员数据');return}
    const ud=JSON.parse(raw),skills=await loadBaseSkills(),result=generateSchedule(ud,skills)
    let h='<div class="shift-tabs">';for(const s of result.schedules)h+=`<div class="shift-tab active" onclick="showShift(this,'shift${s.shift}')">${s.label}</div>`
    h+='</div>'
    for(const s of result.schedules){h+=`<div id="shift${s.shift}" style="display:${s.shift===1?'block':'none'}">`
      h+=`<div class="facility-card"><h4>🏛️ 控制中心</h4>`;for(const o of(s.facilities.control?.assigned||[]))h+=`<div class="slot"><span class="name">${o.name}</span><span class="eff">${o.skill.desc||''}</span></div>`;h+=`</div>`
      for(const mf of(s.facilities.manufacture||[])){h+=`<div class="facility-card"><h4>🏭 ${mf.label}</h4>`;for(const o of(mf.assigned||[])){const c=o.skill.value>0?'eff-good':'eff';const mood=o.moodCost?` 💚${o.moodCost.cost>0?'+':''}${o.moodCost.cost}`:'';h+=`<div class="slot"><span class="name">${o.name}</span><span class="${c}">${o.skill.desc||''}${mood}</span></div>`}h+=`<div class="eff-total" style="padding:4px;font-size:11px">效率: ${mf.efficiency.toFixed(1)}</div></div>`}
      for(const tr of(s.facilities.trading||[])){h+=`<div class="facility-card"><h4>🏪 ${tr.label}</h4>`;for(const o of(tr.assigned||[])){const c=o.skill.value>0?'eff-good':'eff';h+=`<div class="slot"><span class="name">${o.name}</span><span class="${c}">${o.skill.desc||''}</span></div>`}h+=`<div class="eff-total" style="padding:4px;font-size:11px">效率: ${tr.efficiency.toFixed(1)}</div></div>`}
      for(const pw of(s.facilities.power||[])){h+=`<div class="facility-card"><h4>⚡ ${pw.label}</h4>`;for(const o of(pw.assigned||[])){const c=o.skill.value>0?'eff-good':'eff';h+=`<div class="slot"><span class="name">${o.name}</span><span class="${c}">${o.skill.desc||''}</span></div>`}h+=`<div class="eff-total" style="padding:4px;font-size:11px">效率: ${pw.efficiency.toFixed(1)}</div></div>`}
      if(s.facilities.meeting?.assigned){h+=`<div class="facility-card"><h4>🤝 会客室</h4>`;for(const o of s.facilities.meeting.assigned){const c=o.skill.value>0?'eff-good':'eff';h+=`<div class="slot"><span class="name">${o.name}</span><span class="${c}">${o.skill.desc||''}</span></div>`}h+=`</div>`}
      if(s.facilities.training?.assigned){h+=`<div class="facility-card"><h4>🎯 训练室</h4>`;for(const o of s.facilities.training.assigned){const c=o.skill.value>0?'eff-good':'eff';h+=`<div class="slot"><span class="name">${o.name}</span><span class="${c}">${o.skill.desc||''}</span></div>`}h+=`</div>`}
      h+=`<div class="eff-total">生产效率: ${s.efficiency.toFixed(1)} | 💚心情: ${s.moodCost.toFixed(2)}/h ${s.moodCost>6?'⚠️偏高':''}</div></div>`
    }
    h+=`<div class="eff-total" style="margin-top:4px">两班总效率: ${result.totalEfficiency.toFixed(1)}</div>`
    document.getElementById('scheduleResult').innerHTML=h;document.getElementById('scheduleCard').classList.add('show')
  }catch(e){alert('排班失败: '+e.message);console.error(e)}finally{btn.disabled=false;btn.innerHTML='⚡ 生成排班表'}
}
function showShift(el,id){document.querySelectorAll('.shift-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.querySelectorAll('[id^="shift"]').forEach(d=>d.style.display='none');document.getElementById(id).style.display='block'}
</script>
<script>
document.getElementById('loginBtn').addEventListener('click', login)
document.getElementById('scheduleBtn').addEventListener('click', runSchedule)
document.getElementById('credInput').addEventListener('keydown', e => { if(e.key==='Enter') login() })
</script>
</body>
</html>
