<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>罗德岛智能排班系统</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh}
.page{max-width:520px;margin:0 auto;padding:40px 20px}
.logo{text-align:center;margin-bottom:28px}
.logo h1{color:#d4a843;font-size:24px;letter-spacing:2px}
.logo p{color:#888;font-size:13px;margin-top:6px}
.card{background:#16213e;border-radius:12px;border:1px solid #2a3a5e;padding:28px;margin-bottom:16px}
.card h2{font-size:15px;color:#d4a843;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.steps{background:#0f1629;border-radius:8px;padding:14px;font-size:13px;color:#ccc;line-height:1.8;margin-bottom:16px}
.steps code{display:block;background:#1a1a2e;padding:10px;border-radius:6px;font-size:12px;color:#5398ff;word-break:break-all;margin:8px 0}
label{display:block;font-size:13px;color:#aaa;margin-bottom:6px}
input{width:100%;padding:10px 14px;background:#0f1629;border:1px solid #2a3a5e;border-radius:8px;color:#e0e0e0;font-size:14px;outline:none;transition:border .2s}
input:focus{border-color:#5398ff}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;cursor:pointer;transition:opacity .2s;margin-top:4px}
.btn-primary{background:#d4a843;color:#1a1a2e;font-weight:600}
.btn-primary:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.status{padding:10px 14px;border-radius:6px;font-size:13px;margin-top:12px;display:none}
.status.error{display:block;background:#3d1a1a;border:1px solid #6b2a2a;color:#ff6b6b}
.status.success{display:block;background:#1a3d1a;border:1px solid #2a6b2a;color:#6bff6b}
.status.info{display:block;background:#1a2a3d;border:1px solid #2a4a6b;color:#6bb5ff}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #1a1a2e;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.result{display:none;margin-top:12px}
.result.show{display:block}
.result pre{background:#0f1629;padding:12px;border-radius:6px;font-size:11px;color:#6bb5ff;overflow-x:auto;max-height:300px}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
th{text-align:left;color:#d4a843;padding:6px 8px;border-bottom:1px solid #2a3a5e}
td{padding:6px 8px;border-bottom:1px solid #1a2a3e}
tr:hover td{background:#1a2a4e}
.rarity5{color:#d4a843}.rarity6{color:#ff6b35}.rarity4{color:#aa88ff}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat-item{background:#0f1629;border-radius:8px;padding:12px;text-align:center}
.stat-num{font-size:20px;font-weight:700;color:#d4a843}
.stat-label{font-size:11px;color:#888;margin-top:2px}
</style>
</head>
<body>
<div class="page">
  <div class="logo">
    <h1>◇ 罗德岛智能排班系统</h1>
    <p>基于森空岛 API · 数据本地存储</p>
  </div>
  
  <div class="card">
    <h2>🔐 登录</h2>
    <div class="steps">
      <strong>一步获取凭证</strong><br>
      1. 打开 <a href="https://www.skland.com" target="_blank" style="color:#5398ff">森空岛官网</a> 并登录<br>
      2. F12 → Console → 粘贴以下命令回车：<br>
      <code>copy(localStorage.getItem('SK_OAUTH_CRED_KEY'))</code>
      3. 回到本页粘贴到下方输入框
    </div>
    <label>Credential</label>
    <input id="credInput" placeholder="粘贴从森空岛复制的 cred"/>
    <button id="loginBtn" class="btn btn-primary" onclick="login()">获取干员数据</button>
    <div id="status" class="status"></div>
  </div>
  
  <div id="resultCard" class="card result">
    <h2>📊 数据概览</h2>
    <div id="stats" class="stat-grid"></div>
    <h2 style="margin-top:16px">🧑‍✈️ 干员列表</h2>
    <div id="charTable" style="max-height:300px;overflow-y:auto"></div>
  </div>
</div>

<script>
function sign(path, params, token) {
  const ts = String(Math.floor((Date.now() - 300) / 1000))
  const headers = {
    platform: '3',
    timestamp: ts,
    dId: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:109.0) Gecko/20100101 Firefox/118.0',
    vName: '1.2.0'
  }
  const text = path + (params||'') + ts + JSON.stringify(headers)
  const hmacHex = CryptoJS.HmacSHA256(text, token).toString()
  const sign = CryptoJS.MD5(hmacHex).toString()
  return { timestamp: ts, sign, headers }
}

async function api(url, headers) {
  const r = await fetch(url, { headers })
  const t = await r.text()
  try { return JSON.parse(t) } catch { return { code: -1, message: t.slice(0,200) } }
}

function showStatus(type, msg) {
  const el = document.getElementById('status')
  el.className = 'status ' + type
  el.innerHTML = msg
}

const rarityClass = ['','','','rarity4','rarity5','rarity6']
const rarityLabel = ['','','','★4','★5','★6']

async function login() {
  const btn = document.getElementById('loginBtn')
  const cred = document.getElementById('credInput').value.trim()
  if (!cred) { showStatus('error', '请输入credential'); return }
  
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span>获取中...'
  
  try {
    showStatus('info', '正在连接森空岛...')
    const r1 = await api('/api/sw/v1/auth/refresh', { cred })
    if (r1.code !== 0) throw new Error('刷新token失败: ' + (r1.message || ''))
    const token = r1.data.token
    
    showStatus('info', '已获取签名token...')
    
    const s1 = sign('/api/v1/game/player/binding', '', token)
    const r2 = await api('/api/sk/v1/game/player/binding', { cred, ...s1.headers, sign: s1.sign })
    if (r2.code !== 0) throw new Error('获取绑定失败: ' + (r2.message || ''))
    
    let uid = '0', nick = ''
    for (const a of (r2.data?.list||[])) {
      if (a.appCode === 'arknights') {
        uid = a.bindingList[0].uid
        nick = a.bindingList[0].nickName || ''
        break
      }
    }
    if (uid === '0') throw new Error('未找到明日方舟角色绑定')
    showStatus('info', 'UID: ' + uid)
    
    const s2 = sign('/api/v1/game/player/info', 'uid='+uid, token)
    const r3 = await api('/api/sk/v1/game/player/info?uid='+uid, { cred, ...s2.headers, sign: s2.sign })
    if (r3.code !== 0) throw new Error('获取数据失败: ' + (r3.message || ''))
    
    const d = r3.data
    const chars = d.chars || []
    const building = d.building || {}
    const charInfoMap = d.charInfoMap || {}
    
    showStatus('success', '✅ 获取成功！' + chars.length + '名干员')
    
    // 统计
    const stats = document.getElementById('stats')
    stats.innerHTML = '' +
      '<div class="stat-item"><div class="stat-num">' + chars.length + '</div><div class="stat-label">干员</div></div>' +
      '<div class="stat-item"><div class="stat-num">' + (d.status?.level||'?') + '</div><div class="stat-label">博士等级</div></div>' +
      '<div class="stat-item"><div class="stat-num">' + ((building.manufactures||[]).length) + '</div><div class="stat-label">制造站</div></div>'
    
    // 干员表格
    let html = '<table><tr><th>名字</th><th>星级</th><th>等级</th><th>精英</th></tr>'
    for (const c of chars) {
      const id = c.id || c.charId
      const info = charInfoMap[id]
      const name = info?.name || id
      const rarity = c.rarity || info?.rarity || 1
      const cls = rarityClass[rarity] || ''
      html += '<tr><td class="' + cls + '">' + name + '</td>' +
        '<td>' + (rarityLabel[rarity] || '★' + rarity) + '</td>' +
        '<td>' + (c.level||'?') + '</td>' +
        '<td>' + ('精英' + (c.evolvePhase||0)) + '</td></tr>'
    }
    html += '</table>'
    document.getElementById('charTable').innerHTML = html
    document.getElementById('resultCard').classList.add('show')
    
    // 存数据
    localStorage.setItem('ak_user_data', JSON.stringify({
      nickname: d.status?.nickName || nick || '博士',
      level: d.status?.level || 0,
      uid,
      chars: chars.map(c => ({ charId: c.id||c.charId, rarity: (c.rarity||charInfoMap[c.id||c.charId]?.rarity||1), level: c.level||1, elite: c.evolvePhase||0, potential: Math.ceil((c.potentialRank||0)+1), own: true, name: charInfoMap[c.id||c.charId]?.name||c.id||c.charId })),
      building: { manufactures: building.manufactures||[], tradings: building.tradings||[], dormitories: building.dormitories||[], power: building.power||null, meeting: building.meeting||null, training: building.training||null, tiredChars: building.tiredChars||[], labor: building.labor||{} },
      charInfoMap: Object.fromEntries(Object.entries(charInfoMap).map(([k,v]) => [k, {name: v.name, rarity: v.rarity}])),
    }))
    
  } catch (e) {
    showStatus('error', '❌ ' + e.message)
    console.error(e)
  } finally {
    btn.disabled = false
    btn.innerHTML = '获取干员数据'
  }
}
</script>
</body>
</html>
